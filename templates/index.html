<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Video Synth Console</title>
    <style>
        :root { --bg: #F5F5F5; --surface: #FFFFFF; --text: #111111; --border: #DDDDDD; --accent: #000000; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        .panel { padding: 25px; background: var(--surface); overflow-y: auto; }
        .editor-panel { width: 420px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.02); z-index: 10;}
        .preview-panel { flex: 1; display: flex; flex-direction: column; align-items: center; background: #EAEAEA; padding-top: 40px;}
        
        h2 { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 10px 0; border-bottom: 2px solid var(--accent); padding-bottom: 8px; display: inline-block;}
        
        .form-group { display: flex; flex-direction: column; gap: 6px; font-size: 0.85rem; margin-bottom: 8px;}
        .form-group label { font-weight: 600; color: #555; }
        .row { display: flex; gap: 12px; }
        .row > * { flex: 1; }
        
        input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid var(--border); border-radius: 4px; background: #FAFAFA; font-family: inherit; outline: none; transition: all 0.2s; }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); background: #FFF; box-shadow: 0 0 0 2px rgba(0,0,0,0.05);}
        
        button { padding: 14px; background: var(--surface); color: var(--text); font-weight: bold; border: 2px solid var(--accent); border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
        button:hover { background: var(--accent); color: var(--surface); }
        button.primary { background: var(--accent); color: var(--surface); margin-top: 10px;}
        button.primary:hover { opacity: 0.8; }

        .preview-img { max-width: 90%; max-height: 55vh; border: 1px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-radius: 4px; background: #FFF;}
        
        .log-box { width: 90%; max-width: 1200px; flex: 1; margin: 30px 0; background: #1E1E1E; color: #4AF626; font-family: "Courier New", monospace; padding: 20px; font-size: 0.85rem; overflow-y: auto; border-radius: 6px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);}
        .progress-bar-container { width: 90%; max-width: 1200px; height: 6px; background: #DDD; margin-top: 20px; border-radius: 3px; overflow: hidden;}
        .progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }
    </style>
</head>
<body>

<div class="panel editor-panel">
    <h2>Data & Layout</h2>
    <div id="config-form" style="display: flex; flex-direction: column; gap: 10px;">
        </div>
    <div style="display: flex; gap: 10px; margin-top: 10px; flex-direction: column;">
        <button onclick="updatePreview()">Refresh Preview</button>
        <button class="primary" onclick="buildVideo()">Build Final Video</button>
    </div>
</div>

<div class="panel preview-panel">
    <img id="preview-image" class="preview-img" src="" alt="Live Preview..." />
    <div class="progress-bar-container"><div id="progress-bar" class="progress-bar"></div></div>
    <div id="log-console" class="log-box">SYSTEM READY. WAITING FOR COMMANDS...\n</div>
</div>

<script>
    let currentConfig = {};
    const textLayers = ['text1', 'text2', 'text3', 'text4'];

    function renderForm(cfg) {
        const form = document.getElementById('config-form');
        form.innerHTML = '';
        
        // Data Inputs
        form.innerHTML += `<div class="form-group"><label>Text 1 (JSON Array)</label><textarea id="data-text1" rows="2">${JSON.stringify(cfg.texts.text1)}</textarea></div>`;
        form.innerHTML += `<div class="form-group"><label>Text 3 (JSON Array)</label><textarea id="data-text3" rows="2">${JSON.stringify(cfg.texts.text3)}</textarea></div>`;
        
        // Layout Inputs
        textLayers.forEach(key => {
            const layout = cfg.layout[key];
            if(!layout) return;
            form.innerHTML += `
            <div style="border-left: 4px solid #E0E0E0; padding-left: 15px; margin-top: 10px;">
                <strong style="font-size: 0.9rem; color: #333;">${key.toUpperCase()} STYLE</strong>
                <div class="row" style="margin-top: 8px;">
                    <div class="form-group"><label>X Pos</label><input type="number" id="${key}-x" value="${layout.x}"></div>
                    <div class="form-group"><label>Y Pos</label><input type="number" id="${key}-y" value="${layout.y}"></div>
                    <div class="form-group"><label>Size</label><input type="number" id="${key}-size" value="${layout.size}"></div>
                </div>
                <div class="row">
                    <div class="form-group"><label>Opacity</label><input type="number" step="0.1" max="1" min="0" id="${key}-opacity" value="${layout.opacity}"></div>
                    <div class="form-group"><label>Color</label><input type="color" id="${key}-color" value="${layout.color}" style="padding: 2px;"></div>
                </div>
                <div class="form-group">
                    <label>Font Family</label>
                    <select id="${key}-font">
                        <option value="MiSans-Heavy.ttf" ${layout.font === 'MiSans-Heavy.ttf' ? 'selected' : ''}>MiSans Heavy</option>
                        <option value="MiSans-Normal.ttf" ${layout.font === 'MiSans-Normal.ttf' ? 'selected' : ''}>MiSans Normal</option>
                        <option value="MiSans-Light.ttf" ${layout.font === 'MiSans-Light.ttf' ? 'selected' : ''}>MiSans Light</option>
                        <option value="MiSans-ExtraLight.ttf" ${layout.font === 'MiSans-ExtraLight.ttf' ? 'selected' : ''}>MiSans ExtraLight</option>
                        <option value="msyh.ttc" ${layout.font === 'msyh.ttc' ? 'selected' : ''}>微软雅黑 (System)</option>
                    </select>
                </div>
            </div>`;
        });
    }

    function gatherForm() {
        try {
            currentConfig.texts.text1 = JSON.parse(document.getElementById('data-text1').value);
            currentConfig.texts.text3 = JSON.parse(document.getElementById('data-text3').value);
        } catch(e) { alert("Invalid JSON format in Text arrays!"); return null; }
        
        textLayers.forEach(key => {
            if(!currentConfig.layout[key]) return;
            currentConfig.layout[key].x = parseInt(document.getElementById(`${key}-x`).value);
            currentConfig.layout[key].y = parseInt(document.getElementById(`${key}-y`).value);
            currentConfig.layout[key].size = parseInt(document.getElementById(`${key}-size`).value);
            currentConfig.layout[key].opacity = parseFloat(document.getElementById(`${key}-opacity`).value);
            currentConfig.layout[key].color = document.getElementById(`${key}-color`).value;
            currentConfig.layout[key].font = document.getElementById(`${key}-font`).value;
        });
        return currentConfig;
    }

    async function loadConfig() {
        const res = await fetch('/api/config');
        currentConfig = await res.json();
        renderForm(currentConfig);
        updatePreview();
    }

    async function updatePreview() {
        const cfg = gatherForm();
        if(!cfg) return;
        const res = await fetch('/api/preview', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(cfg)
        });
        const data = await res.json();
        document.getElementById('preview-image').src = data.url;
    }

    function log(msg) {
        const consoleEl = document.getElementById('log-console');
        consoleEl.innerHTML += `> ${msg}\n`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function buildVideo() {
        const cfg = gatherForm();
        if(!cfg) return;
        
        document.getElementById('progress-bar').style.width = '0%';
        log("Initializing pipeline...");

        fetch('/api/preview', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(cfg)
        }).then(() => {
            const source = new EventSource('/api/build');
            
            source.addEventListener('log', e => log(JSON.parse(e.data).msg || JSON.parse(e.data)));
            source.addEventListener('progress', e => {
                const data = JSON.parse(e.data);
                document.getElementById('progress-bar').style.width = `${data.pct}%`;
                log(`[PROGRESS] ${data.pct}% - ${data.msg}`);
            });
            source.addEventListener('done', e => {
                log(`SUCCESS: Saved to ${JSON.parse(e.data).msg || JSON.parse(e.data)}`);
                document.getElementById('progress-bar').style.width = `100%`;
                source.close();
            });
            source.addEventListener('error', e => {
                log(`ERROR: ${JSON.parse(e.data).msg}`);
                source.close();
            });
        });
    }

    window.onload = loadConfig;
</script>
</body>
</html>
